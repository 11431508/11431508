<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Flood - Pastel Edition</title>
    <style>
        :root {
            --bg-color: #f5f0ff;
            --text-color: #7b68ee;
            --panel-bg: #ffffff;
            --border-radius: 16px;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
        }

        .game-container {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(123, 104, 238, 0.15);
            text-align: center;
            max-width: 90vw;
        }

        .stats {
            margin-bottom: 20px;
        }

        .steps-label {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 5px;
        }

        #steps-count {
            display: block;
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-color);
            line-height: 1;
        }

        canvas {
            border-radius: 8px;
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            margin: 10px 0;
            max-width: 100%;
            height: auto;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .color-btn {
            width: 45px;
            height: 45px;
            border: 4px solid white;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .color-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .color-btn:active {
            transform: scale(0.95);
        }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: var(--border-radius);
            text-align: center;
        }

        button.restart-btn {
            background: var(--text-color);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="stats">
            <div class="steps-label">剩餘步數</div>
            <span id="steps-count">25</span>
        </div>

        <canvas id="gameCanvas" width="300" height="300"></canvas>

        <div class="controls" id="colorPalette"></div>
    </div>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 id="modalTitle">遊戲結束</h2>
            <p id="modalMessage"></p>
            <button class="restart-btn" onclick="initGame()">重新開始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const stepsDisplay = document.getElementById('steps-count');
        const palette = document.getElementById('colorPalette');
        const modal = document.getElementById('gameModal');
        
        // 遊戲參數
        const GRID_SIZE = 14; // 14x14 網格
        const CELL_SIZE = canvas.width / GRID_SIZE;
        const INITIAL_STEPS = 25;
        
        // 柔和色調
        const COLORS = [
            '#FFB7B2', // 粉紅
            '#FFDAC1', // 嫩橘
            '#E2F0CB', // 淺黃綠
            '#B5EAD7', // 湖水綠
            '#C7CEEA', // 柔藍
            '#D4A5FF'  // 淺紫
        ];

        let grid = [];
        let currentSteps = 0;
        let isProcessing = false;

        // 初始化遊戲
        function initGame() {
            modal.style.display = 'none';
            currentSteps = INITIAL_STEPS;
            stepsDisplay.textContent = currentSteps;
            grid = [];
            
            // 隨機填充網格
            for (let r = 0; r < GRID_SIZE; r++) {
                grid[r] = [];
                for (let c = 0; c < GRID_SIZE; c++) {
                    grid[r][c] = COLORS[Math.floor(Math.random() * COLORS.length)];
                }
            }
            
            // 生成控制按鈕（僅執行一次）
            if (palette.innerHTML === '') {
                COLORS.forEach(color => {
                    const btn = document.createElement('div');
                    btn.className = 'color-btn';
                    btn.style.backgroundColor = color;
                    btn.onclick = () => handleColorChange(color);
                    palette.appendChild(btn);
                });
            }
            
            draw();
        }

        // 繪製網格
        function draw() {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    ctx.fillStyle = grid[r][c];
                    ctx.fillRect(c * CELL_SIZE, r * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                }
            }
        }

        // 填色邏輯 (Flood Fill)
        function handleColorChange(newColor) {
            const startColor = grid[0][0];
            
            if (newColor === startColor || currentSteps <= 0) return;

            currentSteps--;
            stepsDisplay.textContent = currentSteps;

            // 執行擴散
            floodFill(0, 0, startColor, newColor);
            draw();
            checkGameStatus();
        }

        function floodFill(r, c, targetColor, replacementColor) {
            if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) return;
            if (grid[r][c] !== targetColor) return;

            grid[r][c] = replacementColor;

            floodFill(r + 1, c, targetColor, replacementColor);
            floodFill(r - 1, c, targetColor, replacementColor);
            floodFill(r, c + 1, targetColor, replacementColor);
            floodFill(r, c - 1, targetColor, replacementColor);
        }

        function checkGameStatus() {
            const firstColor = grid[0][0];
            let allMatched = true;

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] !== firstColor) {
                        allMatched = false;
                        break;
                    }
                }
                if (!allMatched) break;
            }

            if (allMatched) {
                showModal("太厲害了！", "你成功佔領了所有色塊！✨");
            } else if (currentSteps <= 0) {
                showModal("遊戲結束", "可惜步數用完了，再試一次吧！");
            }
        }

        function showModal(title, msg) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = msg;
            setTimeout(() => {
                modal.style.display = 'flex';
            }, 300);
        }

        // 啟動
        window.onload = initGame;
    </script>
</body>
</html>
